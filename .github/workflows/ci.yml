name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # FixtureSolutionTests run against the in-repo fixtures/FixtureSolution
      # (self-restoring). SharpCoderSolutionTests skip visibly here - they need
      # the sibling SharpCoder checkout and run locally.
      - name: Test
        run: dotnet test --no-build --configuration Release
