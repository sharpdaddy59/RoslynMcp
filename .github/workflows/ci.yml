name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # The integration tests load a sibling SharpCoder checkout that doesn't
      # exist on CI runners - they run locally (dotnet test). CI gates the build.
      # TODO: add a self-contained fixture solution so tests can run here too.
